# Cosign image-signing workflow template — copy to <repo>/.github/workflows/cosign-sign-image.yml
# Per ADR-041 (Trivy + Cosign deploy gate). Authoritative post-fix template
# canonicalized in Cosign Compound W5-C Fanout (ENTRY #343).
#
# Required GitHub secrets (pull from Infisical-CI MI):
#   COSIGN_PRIVATE_KEY  — base64-encoded private key
#   COSIGN_PASSWORD     — passphrase for private key
#   GHCR_PAT            — GitHub PAT with write:packages (or use built-in GITHUB_TOKEN if same org)
#
# Public key for verification: published at
#   https://gist.githubusercontent.com/Cramraika/c246bdb779518a588617839bfe2a75c1/raw/cosign.pub
#
# Coolify pre-deploy hook (vps_host/scripts/coolify-hooks/trivy-pre-deploy.sh):
#   - Pulls image
#   - Runs Trivy CVE scan
#   - cosign verify --key <pub-key-url> <image>
#   - Refuses deploy on either Trivy CRITICAL or cosign verify fail

name: Cosign image signing

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write  # for keyless via OIDC if desired (alternate path)

jobs:
  build-sign-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lowercase image repo
        run: echo "IMAGE_REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_REPO_LOWER }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with key
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -euo pipefail
          for tag in $(echo "${{ steps.meta.outputs.tags }}" | tr ',' ' '); do
            echo "Signing $tag@${{ steps.build.outputs.digest }}"
            cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
              "$tag@${{ steps.build.outputs.digest }}"
          done

      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          # CycloneDX is the fleet-canonical SBOM format (host syft-sbom.sh emits
          # cyclonedx-json + --search queries .components[]). Keep CI in lock-step so a
          # CI-attested image is queryable by the host emergency-triage path (OW-523).
          image: ghcr.io/${{ env.IMAGE_REPO_LOWER }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Attach SBOM to image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign attest --yes --key env://COSIGN_PRIVATE_KEY \
            --predicate sbom.cdx.json --type cyclonedx \
            "ghcr.io/${{ env.IMAGE_REPO_LOWER }}@${{ steps.build.outputs.digest }}"

      - name: Verify signature (smoke test)
        run: |
          cosign verify \
            --key https://gist.githubusercontent.com/Cramraika/c246bdb779518a588617839bfe2a75c1/raw/cosign.pub \
            "ghcr.io/${{ env.IMAGE_REPO_LOWER }}@${{ steps.build.outputs.digest }}"
