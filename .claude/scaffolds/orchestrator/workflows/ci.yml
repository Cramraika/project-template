name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/{{ORCHESTRATOR_NAME}}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff lint
        run: ruff check {{ORCHESTRATOR_PKG}}

      - name: Pytest
        run: pytest -v tests/

  registry-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq + yq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate registry shape (jq)
        run: |
          yq -o=json scripts/{{ORCHESTRATOR_NAME}}/registry.yml \
            | jq -e '
              .schema_version == 1
              and (.{{ENTITY_NAME_PLURAL}} | type == "array")
              and (
                .{{ENTITY_NAME_PLURAL}}
                | all(has("name") and has("slug") and has("desired_state"))
              )
            '
